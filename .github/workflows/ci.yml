name: CI/CD Pipeline

on:
  pull_request:
    branches:
      - main

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: ./FrontEnd
        run: npm install

      - name: Run Tests
        working-directory: ./FrontEnd
        run: npm run test

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure Root Environment Variables
        run: cp .env.example .env

      - name: Configure Backend Environment Variables
        run: |
          cat > BackEnd/.env << 'EOF'
          PORT=4000
          DATABASE_URL="postgresql://postgres:postgres@127.0.0.1:5432/eris?schema=public"
          MONGO_URI="mongodb://root:rootpassword@127.0.0.1:27017/eris?authSource=admin"
          EOF

      - name: Start Database Infrastructure
        run: docker compose up -d postgres mongodb

      - name: Install Dependencies
        working-directory: ./BackEnd
        run: npm install

      - name: Generate Prisma Client
        working-directory: ./BackEnd
        run: npx prisma generate

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            if docker exec eris-postgres pg_isready -U postgres; then
              echo "PostgreSQL is ready!"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 1
          done

      - name: Wait for MongoDB
        run: |
          for i in $(seq 1 30); do
            if docker exec eris-mongodb mongosh --eval "db.adminCommand('ping')" -u root -p rootpassword --authenticationDatabase admin >/dev/null 2>&1; then
              echo "MongoDB is ready!"
              break
            fi
            echo "Waiting for MongoDB... ($i/30)"
            sleep 1
          done

      - name: Run Prisma Migrations
        working-directory: ./BackEnd
        run: npx prisma migrate deploy

      - name: Run Tests
        working-directory: ./BackEnd
        run: npm run test

      - name: Stop Database Infrastructure
        if: always()
        run: docker compose down
