name: CI/CD Pipeline

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Common Dependencies & Setup
        run: |
          npm install
          npm run setup:frontend

      - name: Run Tests
        run: npm run test:frontend

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure Environment Variables
        run: cp .env.example .env

      - name: Start Database Infrastructure
        run: docker compose up -d postgres mongodb pocketbase

      - name: Install Dependencies & Setup
        run: |
          npm install
          npm run install:backend

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            if docker exec eris-postgres pg_isready -U postgres; then
              echo "PostgreSQL is ready!"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 1
          done

      - name: Wait for MongoDB
        run: |
          for i in $(seq 1 30); do
            if docker exec eris-mongodb mongosh --eval "db.adminCommand('ping')" -u root -p rootpassword --authenticationDatabase admin >/dev/null 2>&1; then
              echo "MongoDB is ready!"
              break
            fi
            echo "Waiting for MongoDB... ($i/30)"
            sleep 1
          done

      - name: Wait for PocketBase & Initialize Admin
        run: |
          for i in $(seq 1 30); do
            if curl -s http://127.0.0.1:8090/api/health >/dev/null; then
              echo "PocketBase is ready!"
              break
            fi
            echo "Waiting for PocketBase... ($i/30)"
            sleep 1
          done
          docker compose run --rm pocketbase-init

      - name: Run Prisma Migrations
        run: npm run db:migrate:deploy

      - name: Run Tests
        run: npm run test:backend

      - name: Stop Database Infrastructure
        if: always()
        run: docker compose down -v
