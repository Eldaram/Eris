openapi: 3.0.0
info:
  title: Eris API
  version: 1.0.0
  description: API documentation for the Eris backend
servers:
  - url: http://localhost:3000
    description: Local development server
tags:
  - name: Health
    description: System health check endpoints
  - name: Users
    description: User authentication and management endpoints
  - name: Servers
    description: Server management endpoints
  - name: Messages
    description: Chat message management endpoints
paths:
  /api/health:
    get:
      tags:
        - Health
      summary: Health check endpoint
      description: Returns the operational status of the Eris API.
      responses:
        '200':
          description: API is running successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  message:
                    type: string
                    example: Eris API is running
  /api/users:
    get:
      tags:
        - Users
      summary: Get all users
      description: Retrieves a list of all registered users.
      responses:
        '200':
          description: A list of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '500':
          description: Internal server error
    post:
      tags:
        - Users
      summary: Register a new user
      description: Creates a new user account with email-based authentication.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - email
                - password
                - confirmPassword
              properties:
                username:
                  type: string
                  description: Unique username (3-32 characters, alphanumeric with dots, underscores, hyphens)
                  example: john_doe
                email:
                  type: string
                  format: email
                  description: Email address
                  example: john@example.com
                password:
                  type: string
                  format: password
                  description: Password (minimum 8 characters)
                  example: SecurePassword123
                confirmPassword:
                  type: string
                  format: password
                  description: Password confirmation (must match password)
                  example: SecurePassword123
      responses:
        '201':
          description: User successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalidEmail:
                  value:
                    error: Email format is invalid.
                    code: INVALID_EMAIL
                invalidUsername:
                  value:
                    error: Username must be between 3 and 32 characters.
                    code: INVALID_USERNAME
                passwordMismatch:
                  value:
                    error: Passwords do not match.
                    code: PASSWORD_MISMATCH
                invalidPassword:
                  value:
                    error: Password must be at least 8 characters long.
                    code: INVALID_PASSWORD
        '409':
          description: Conflict - resource already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                emailExists:
                  value:
                    error: An account already uses this email.
                    code: EMAIL_ALREADY_EXISTS
                usernameExists:
                  value:
                    error: A user with this username already exists.
                    code: USERNAME_ALREADY_EXISTS
        '500':
          description: Internal server error
  /api/users/me:
    get:
      tags:
        - Users
      summary: Get current logged-in user
      description: Returns the user object attached to the provided connection token.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile successfully retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missingToken:
                  value:
                    error: Authentication token is missing or invalid format
                    code: MISSING_TOKEN
                invalidToken:
                  value:
                    error: Invalid or expired token.
                    code: INVALID_PASSWORD
  /api/users/login:
    post:
      tags:
        - Users
      summary: Login a user
      description: Authenticates a user using their email and password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  description: Email address
                  example: john@example.com
                password:
                  type: string
                  format: password
                  description: Password
                  example: SecurePassword123
      responses:
        '200':
          description: User successfully authenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  token:
                    type: string
                    description: Authentication token
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '400':
          description: Validation error or missing credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalidCredentials:
                  value:
                    error: Invalid email or password.
                    code: INVALID_PASSWORD
        '500':
          description: Internal server error
  /api/servers:
    post:
      tags:
        - Servers
      summary: Create a new server
      description: |
        Creates a new server owned by the authenticated user.
        The API atomically performs three operations:
        1. Creates the server record.
        2. Adds the owner to the server's member list.
        3. Creates a default "general" room inside the server.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  description: The name of the server (1-100 characters).
                  minLength: 1
                  maxLength: 100
                  example: My Awesome Server
      responses:
        '200':
          description: Server successfully created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                    description: The unique identifier of the newly created server.
                    example: 123e4567-e89b-12d3-a456-426614174000
        '400':
          description: Validation error — server name is missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missingName:
                  value:
                    error: Server name is required.
                    code: INVALID_SERVER_NAME
                nameTooLong:
                  value:
                    error: Server name must be between 1 and 100 characters.
                    code: INVALID_SERVER_NAME
        '401':
          description: Unauthorized — missing or invalid authentication token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missingToken:
                  value:
                    error: Authentication token is missing or invalid format
                    code: MISSING_TOKEN
                invalidToken:
                  value:
                    error: Invalid or expired token.
                    code: INVALID_TOKEN
        '500':
          description: Internal server error — server could not be created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                creationFailed:
                  value:
                    error: Failed to create the server.
                    code: SERVER_CREATION_FAILED
  /api/messages:
    post:
      tags:
        - Messages
      summary: Create a new message
      description: Creates a new message in a specific room.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - room_id
                - author_id
                - content
              properties:
                room_id:
                  type: string
                  description: The ID of the room
                author_id:
                  type: string
                  description: The ID of the author (user)
                content:
                  type: string
                  description: The text content of the message
      responses:
        '201':
          description: Message successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          description: Missing required fields
        '500':
          description: Internal server error
  /api/messages/room/{roomId}:
    get:
      tags:
        - Messages
      summary: Get messages by room
      description: Retrieves all messages for a specific room.
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
          description: The ID of the room to fetch messages from
      responses:
        '200':
          description: A list of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
        '500':
          description: Internal server error

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier of the user (UUID)
        username:
          type: string
          description: The username for the user
        pocketbaseId:
          type: string
          description: References the user ID in PocketBase
        createdAt:
          type: string
          format: date-time
          description: The creation timestamp of the user
    Error:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message
        code:
          type: string
          description: Machine-readable error code
          enum:
            - INVALID_USERNAME
            - INVALID_EMAIL
            - USERNAME_ALREADY_EXISTS
            - EMAIL_ALREADY_EXISTS
            - INVALID_PASSWORD
            - PASSWORD_MISMATCH
            - MISSING_TOKEN
            - INVALID_TOKEN
            - UNAUTHORIZED
            - INVALID_SERVER_NAME
            - SERVER_CREATION_FAILED
    Message:
      type: object
      properties:
        _id:
          type: string
          description: The unique identifier of the message
        room_id:
          type: string
          description: Refers to Postgres_Rooms.id
        author_id:
          type: string
          description: Refers to Postgres_Users.id
        content:
          type: string
          description: The text content of the message
        createdAt:
          type: string
          format: date-time
          description: The creation timestamp of the message
        updatedAt:
          type: string
          format: date-time
          description: The last update timestamp of the message
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
