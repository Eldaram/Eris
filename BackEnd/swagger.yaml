openapi: 3.0.0
info:
  title: Eris API
  version: 1.0.0
  description: API documentation for the Eris backend
servers:
  - url: http://localhost:3000
    description: Local development server
tags:
  - name: Health
    description: System health check endpoints
  - name: Messages
    description: Chat message management endpoints
paths:
  /api/health:
    get:
      tags:
        - Health
      summary: Health check endpoint
      description: Returns the operational status of the Eris API.
      responses:
        '200':
          description: API is running successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  message:
                    type: string
                    example: Eris API is running
  /api/messages:
    post:
      tags:
        - Messages
      summary: Create a new message
      description: Creates a new message in a specific room.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - room_id
                - author_id
                - content
              properties:
                room_id:
                  type: string
                  description: The ID of the room
                author_id:
                  type: string
                  description: The ID of the author (user)
                content:
                  type: string
                  description: The text content of the message
      responses:
        '201':
          description: Message successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          description: Missing required fields
        '500':
          description: Internal server error
  /api/messages/room/{roomId}:
    get:
      tags:
        - Messages
      summary: Get messages by room
      description: Retrieves all messages for a specific room.
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
          description: The ID of the room to fetch messages from
      responses:
        '200':
          description: A list of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
        '500':
          description: Internal server error

components:
  schemas:
    Message:
      type: object
      properties:
        _id:
          type: string
          description: The unique identifier of the message
        room_id:
          type: string
          description: Refers to Postgres_Rooms.id
        author_id:
          type: string
          description: Refers to Postgres_Users.id
        content:
          type: string
          description: The text content of the message
        createdAt:
          type: string
          format: date-time
          description: The creation timestamp of the message
        updatedAt:
          type: string
          format: date-time
          description: The last update timestamp of the message
