services:
  postgres:
    image: postgres:15-alpine
    container_name: eris-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-eris}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:6-jammy
    container_name: eris-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-rootpassword}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-eris}
    volumes:
      - mongodb_data:/data/db

  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: eris-pocketbase
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - pocketbase_data:/pb_data
      - pocketbase_public:/pb_public
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8090/api/health" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  pocketbase-init:
    image: ghcr.io/muchobien/pocketbase:latest
    restart: "no"
    depends_on:
      pocketbase:
        condition: service_healthy
    environment:
      PB_ADMIN_EMAIL: ${POCKETBASE_ADMIN_EMAIL:-admin@eris.local}
      PB_ADMIN_PASSWORD: ${POCKETBASE_ADMIN_PASSWORD:-admin_password_123}
    entrypoint: >
      sh -c "pocketbase superuser upsert $$PB_ADMIN_EMAIL $$PB_ADMIN_PASSWORD --dir=/pb_data"
    volumes:
      - pocketbase_data:/pb_data

volumes:
  postgres_data:
  mongodb_data:
  pocketbase_data:
  pocketbase_public:
